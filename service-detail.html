<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service Details - Servising</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #FF9F1C;
      --primary-hover: #E78200;
      --dark-bg: #0B0F19;
      --card-bg: #FFFFFF;
      --text-main: #1F2937;
      --text-muted: #6B7280;
      --bg-light: #F9FAFB;
      --border-color: #E5E7EB;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
      --shadow-lg: 0 20px 35px -10px rgba(0, 0, 0, 0.1), 0 12px 16px -8px rgba(0, 0, 0, 0.08);
      --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background-color: var(--bg-light);
      color: var(--text-main);
      line-height: 1.6;
    }

    header {
      background-color: var(--dark-bg);
      color: white;
      padding: 18px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo {
      font-family: 'Outfit', sans-serif;
      font-size: 26px;
      font-weight: 800;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .account-btn {
      background: transparent;
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.3);
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: var(--transition);
      text-decoration: none;
      display: inline-block;
    }

    .account-btn:hover {
      background-color: rgba(255, 255, 255, 0.1);
      border-color: white;
    }

    .register-btn {
      background: var(--primary);
      color: var(--dark-bg);
      border: 1px solid var(--primary);
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: var(--transition);
      text-decoration: none;
      display: inline-block;
    }

    .register-btn:hover {
      background: var(--primary-hover);
      border-color: var(--primary-hover);
      color: white;
      transform: translateY(-1px);
    }

    .back-to-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 25px;
      transition: var(--transition);
    }

    .back-to-home:hover {
      color: var(--primary-hover);
      transform: translateX(-3px);
    }

    /* Container layout */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    /* Error Page layout */
    .error-container {
      text-align: center;
      padding: 100px 20px;
    }

    .error-container h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 64px;
      color: var(--dark-bg);
      margin-bottom: 20px;
    }

    .error-container p {
      font-size: 18px;
      color: var(--text-muted);
      margin-bottom: 30px;
    }

    .error-container a {
      display: inline-block;
      background: var(--primary);
      color: var(--dark-bg);
      padding: 12px 28px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: 700;
      box-shadow: 0 4px 12px rgba(255, 159, 28, 0.2);
      transition: var(--transition);
    }

    .error-container a:hover {
      background: var(--primary-hover);
      color: white;
      transform: translateY(-2px);
    }

    /* Main Service Grid Split */
    .service-hero-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 40px;
      margin-bottom: 50px;
      align-items: start;
    }

    /* Media/Video Preview */
    .service-media-wrapper {
      background: var(--dark-bg);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      position: relative;
      width: 100%;
      height: 380px;
    }

    .service-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .service-video.ready {
      opacity: 1;
    }

    .service-img-fallback {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    /* Info Column */
    .service-info-column {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .category-tag {
      align-self: flex-start;
      background: rgba(255, 159, 28, 0.1);
      color: var(--primary-hover);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 15px;
    }

    .service-title {
      font-family: 'Outfit', sans-serif;
      font-size: 40px;
      font-weight: 800;
      color: #0F172A;
      line-height: 1.2;
      margin-bottom: 5px;
    }

    .service-title-en {
      font-size: 18px;
      color: var(--text-muted);
      margin-bottom: 20px;
      font-style: italic;
    }

    .service-desc {
      font-size: 16px;
      color: #4B5563;
      margin-bottom: 30px;
    }

    /* Feature highlights */
    .highlights-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .highlights-list li {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 500;
      color: #374151;
    }

    .highlights-list svg {
      color: #10B981;
      flex-shrink: 0;
    }

    /* Pricing Plans Section */
    .section-title {
      font-family: 'Outfit', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: #0F172A;
      margin-bottom: 25px;
      position: relative;
    }

    .section-title::after {
      content: '';
      display: block;
      width: 50px;
      height: 4px;
      background: var(--primary);
      border-radius: 2px;
      margin-top: 8px;
    }

    .pricing-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
      margin-bottom: 60px;
    }

    .pricing-card {
      background: white;
      border: 1px solid var(--border-color);
      border-radius: 18px;
      padding: 30px;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
      cursor: pointer;
      position: relative;
    }

    .pricing-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-lg);
      border-color: rgba(255, 159, 28, 0.4);
    }

    .pricing-card.selected {
      border-color: var(--primary);
      box-shadow: var(--shadow-lg);
      background-color: #FFFDF9;
    }

    .pricing-card.selected::before {
      content: 'Tanlangan';
      position: absolute;
      top: -12px;
      right: 20px;
      background: var(--primary);
      color: var(--dark-bg);
      font-size: 11px;
      font-weight: 700;
      padding: 3px 12px;
      border-radius: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .plan-name {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: #0F172A;
      margin-bottom: 15px;
    }

    .plan-price {
      font-family: 'Outfit', sans-serif;
      font-size: 32px;
      font-weight: 800;
      color: var(--primary-hover);
      margin-bottom: 20px;
    }

    .plan-features {
      list-style: none;
      margin-bottom: 30px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .plan-features li {
      font-size: 13.5px;
      color: #4B5563;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .plan-features li svg {
      color: var(--primary);
      margin-top: 3px;
      flex-shrink: 0;
    }

    .select-plan-btn {
      width: 100%;
      padding: 10px;
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-main);
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: var(--transition);
    }

    .pricing-card.selected .select-plan-btn {
      background: var(--primary);
      border-color: var(--primary);
      color: var(--dark-bg);
    }

    .pricing-card:hover .select-plan-btn {
      background: var(--primary);
      border-color: var(--primary);
      color: var(--dark-bg);
    }

    /* Specialists & Booking Form Grid Split */
    .booking-section-grid {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 40px;
      margin-bottom: 60px;
      align-items: start;
    }

    /* Specialists Row */
    .specialists-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .specialist-card {
      background: white;
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 18px;
      display: flex;
      align-items: center;
      gap: 15px;
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      transition: var(--transition);
      position: relative;
    }

    .specialist-card:hover {
      border-color: rgba(255, 159, 28, 0.4);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .specialist-card.selected {
      border-color: var(--primary);
      background-color: #FFFDF9;
      box-shadow: var(--shadow-md);
    }

    .specialist-card.selected::after {
      content: '✓';
      position: absolute;
      top: 18px;
      right: 20px;
      background: #10B981;
      color: white;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 12px;
      font-weight: 700;
    }

    .specialist-avatar {
      width: 65px;
      height: 65px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--primary);
    }

    .specialist-info h4 {
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: #0F172A;
      margin-bottom: 3px;
    }

    .specialist-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 15px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .specialist-rating {
      color: #FBBF24;
      display: flex;
      align-items: center;
      gap: 3px;
      font-weight: 600;
    }

    /* Booking Form Card */
    .booking-card {
      background: white;
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 35px;
      box-shadow: var(--shadow-md);
    }

    .booking-form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 13px;
      font-weight: 600;
      color: #374151;
    }

    .form-group input, .form-group select, .form-group textarea {
      padding: 11px 14px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background: #F9FAFB;
      outline: none;
      font-size: 14px;
      transition: var(--transition);
    }

    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--primary);
      background: white;
      box-shadow: 0 0 0 3px rgba(255, 159, 28, 0.15);
    }

    .book-submit-btn {
      background: var(--primary);
      color: var(--dark-bg);
      border: none;
      padding: 13px;
      font-size: 15px;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 4px 12px rgba(255, 159, 28, 0.2);
      margin-top: 10px;
    }

    .book-submit-btn:hover {
      background: var(--primary-hover);
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(231, 130, 0, 0.3);
    }

    /* Accordion FAQ */
    .faq-wrapper {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 60px;
    }

    .faq-item {
      background: white;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .faq-question {
      padding: 18px 22px;
      font-size: 15px;
      font-weight: 600;
      color: #0F172A;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
      transition: var(--transition);
    }

    .faq-question:hover {
      background-color: #F8FAFC;
    }

    .faq-answer {
      padding: 0 22px;
      max-height: 0;
      overflow: hidden;
      font-size: 14px;
      color: var(--text-muted);
      transition: max-height 0.3s cubic-bezier(0.16, 1, 0.3, 1), padding 0.3s ease;
    }

    .faq-item.active .faq-answer {
      padding: 0 22px 18px 22px;
      max-height: 200px;
    }

    .faq-icon {
      transition: transform 0.3s ease;
    }

    .faq-item.active .faq-icon {
      transform: rotate(180deg);
    }

    /* Reviews Section */
    .reviews-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 40px;
    }

    .review-card {
      background: white;
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 22px;
      box-shadow: var(--shadow-sm);
    }

    .review-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .review-author {
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: #0F172A;
    }

    .review-date {
      font-size: 12px;
      color: var(--text-muted);
    }

    .review-rating {
      color: #FBBF24;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .review-comment {
      font-size: 13.5px;
      color: #4B5563;
    }

    /* Modal Backdrop */
    .modal-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(11, 15, 25, 0.6);
      backdrop-filter: blur(5px);
      z-index: 1000;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-backdrop.active {
      opacity: 1;
      pointer-events: auto;
    }

    .success-modal {
      background: white;
      width: 100%;
      max-width: 450px;
      border-radius: 24px;
      padding: 40px 30px;
      text-align: center;
      box-shadow: var(--shadow-lg);
      transform: scale(0.9);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .modal-backdrop.active .success-modal {
      transform: scale(1);
    }

    .success-icon-container {
      width: 70px;
      height: 70px;
      background-color: #D1FAE5;
      color: #10B981;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 20px auto;
    }

    .success-modal h3 {
      font-family: 'Outfit', sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: #0F172A;
      margin-bottom: 10px;
    }

    .success-modal p {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 25px;
    }

    .summary-box {
      background: #F8FAFC;
      border-radius: 12px;
      padding: 15px;
      text-align: left;
      font-size: 13px;
      margin-bottom: 25px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
    }

    .summary-label {
      color: var(--text-muted);
      font-weight: 500;
    }

    .summary-val {
      color: #0F172A;
      font-weight: 600;
    }

    .close-modal-btn {
      width: 100%;
      padding: 12px;
      background: var(--dark-bg);
      color: white;
      border: none;
      font-weight: 600;
      font-size: 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: var(--transition);
    }

    .close-modal-btn:hover {
      background: var(--primary);
      color: var(--dark-bg);
    }

    /* Footer */
    footer {
      background-color: var(--dark-bg);
      color: #94A3B8;
      text-align: center;
      padding: 30px;
      font-size: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      margin-top: 60px;
    }

    footer strong {
      color: var(--primary);
    }

    /* Responsive styling */
    @media (max-width: 992px) {
      .service-hero-grid {
        grid-template-columns: 1fr;
      }
      .pricing-grid {
        grid-template-columns: 1fr;
        gap: 20px;
      }
      .booking-section-grid {
        grid-template-columns: 1fr;
      }
      .reviews-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      header {
        padding: 15px 20px;
      }
      .form-row {
        grid-template-columns: 1fr;
        gap: 0;
      }
      .service-title {
        font-size: 30px;
      }
      .service-media-wrapper {
        height: 260px;
      }
    }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="logo-container">
    <div class="logo">UzTour</div>
  </a>
  <div class="header-actions">
    <a href="account.html" class="account-btn" style="text-decoration: none;">Kirish</a>
    <a href="register.html" class="register-btn" style="text-decoration: none;">Ro'yxatdan O'tish</a>
  </div>
</header>

<div class="container" id="main-content">
  <!-- Dynamic content will load here -->
</div>

<div class="modal-backdrop" id="modal-backdrop">
  <div class="success-modal">
    <div class="success-icon-container">
      <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
      </svg>
    </div>
    <h3>Buyurtmangiz qabul qilindi!</h3>
    <p>Tez orada sayohat bo'yicha operatorimiz yoki gidingiz siz bilan bog'lanadi va Click/Payme to'lov havolasini yuboradi.</p>
    
    <div class="summary-box" id="modal-summary">
      <!-- Dynamic summary will insert here -->
    </div>
    
    <button class="close-modal-btn" onclick="closeModal()">Tushunarli</button>
  </div>
</div>

<footer>
  © 2026 <strong>UzTour</strong>. Barcha huquqlar himoyalangan. O'zbekiston sayohat portali.
</footer>

<!-- Load the services database -->
<script src="services-data.js"></script>
<script>
  let selectedPlanName = "";
  let selectedPlanPrice = "";

  document.addEventListener('DOMContentLoaded', () => {
    // 1. Get Query parameter
    const params = new URLSearchParams(window.location.search);
    const serviceId = parseInt(params.get('id'));

    const contentDiv = document.getElementById('main-content');

    // 2. Validate service exists
    if (!serviceId || !SERVICES_DATA[serviceId]) {
      renderErrorPage(contentDiv);
      return;
    }

    const service = SERVICES_DATA[serviceId];
    
    // Set default selected pricing package
    selectedPlanName = service.pricing[1] ? service.pricing[1].name : service.pricing[0].name;
    selectedPlanPrice = service.pricing[1] ? service.pricing[1].price : service.pricing[0].price;

    // 3. Render page content
    renderServicePage(contentDiv, service);

    // 4. Set up interactive events
    initInteractiveFeatures();
  });

  // Render a clean Error Page if service ID not found
  function renderErrorPage(container) {
    container.innerHTML = `
      <div class="error-container">
        <h1>404</h1>
        <p>Kechirasiz, bunday xizmat turi topilmadi yoki o'chirilgan bo'lishi mumkin.</p>
        <a href="index.html">Bosh sahifaga qaytish</a>
      </div>
    `;
    document.title = "Xizmat topilmadi - Servising";
  }

  // Render full service info
  function renderServicePage(container, service) {
    document.title = `${service.titleUz} - Servising`;

    // Render list of highlights
    let highlightsHtml = "";
    service.features.forEach(feat => {
      highlightsHtml += `
        <li>
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
          </svg>
          ${feat}
        </li>
      `;
    });

    // Render pricing packages
    let pricingHtml = "";
    service.pricing.forEach((plan, index) => {
      const isSelected = (plan.name === selectedPlanName);
      
      let planFeaturesHtml = "";
      plan.features.forEach(pf => {
        planFeaturesHtml += `
          <li>
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
            </svg>
            ${pf}
          </li>
        `;
      });

      pricingHtml += `
        <div class="pricing-card ${isSelected ? 'selected' : ''}" data-plan-name="${plan.name}" data-plan-price="${plan.price}">
          <div class="plan-name">${plan.name}</div>
          <div class="plan-price">${plan.price}</div>
          <ul class="plan-features">
            ${planFeaturesHtml}
          </ul>
          <button class="select-plan-btn">Paketni tanlash</button>
        </div>
      `;
    });

    // Render specialists with data attributes for interactivity
    let specialistsHtml = "";
    service.providers.forEach(prov => {
      specialistsHtml += `
        <div class="specialist-card" data-provider-name="${prov.name}">
          <img src="${prov.avatar}" alt="${prov.name}" class="specialist-avatar" onerror="this.src='https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&h=150&q=80'">
          <div class="specialist-info">
            <h4>${prov.name}</h4>
            <div class="specialist-meta">
              <span class="specialist-rating">
                <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
                </svg>
                ${prov.rating}
              </span>
              <span>•  Tajriba: ${prov.experience}</span>
              <span>•  Buyurtmalar: ${prov.completedOrders}+</span>
            </div>
          </div>
        </div>
      `;
    });

    // Render package options in booking dropdown
    let dropdownOptionsHtml = "";
    service.pricing.forEach(plan => {
      const isSelected = (plan.name === selectedPlanName);
      dropdownOptionsHtml += `
        <option value="${plan.name}" ${isSelected ? 'selected' : ''}>${plan.name} (${plan.price})</option>
      `;
    });

    // Render specialist options in booking dropdown
    let specialistDropdownOptionsHtml = `<option value="any">Istalgan bo'sh gid/haydovchi (Tizim tanlaydi)</option>`;
    service.providers.forEach(prov => {
      specialistDropdownOptionsHtml += `
        <option value="${prov.name}">${prov.name}</option>
      `;
    });

    // Render FAQ accordion
    let faqsHtml = "";
    service.faqs.forEach(faq => {
      faqsHtml += `
        <div class="faq-item">
          <div class="faq-question">
            <span>${faq.question}</span>
            <svg class="faq-icon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
            </svg>
          </div>
          <div class="faq-answer">
            <p>${faq.answer}</p>
          </div>
        </div>
      `;
    });

    // Render Reviews
    let reviewsHtml = "";
    service.reviews.forEach(rev => {
      let starsHtml = "";
      for (let i = 1; i <= 5; i++) {
        starsHtml += `
          <svg width="16" height="16" fill="${i <= rev.rating ? '#FBBF24' : '#E5E7EB'}" viewBox="0 0 24 24" style="display:inline-block; margin-right: 2px;">
            <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
          </svg>
        `;
      }

      reviewsHtml += `
        <div class="review-card">
          <div class="review-header">
            <span class="review-author">${rev.author}</span>
            <span class="review-date">${rev.date}</span>
          </div>
          <div class="review-rating">
            ${starsHtml}
          </div>
          <p class="review-comment">"${rev.comment}"</p>
        </div>
      `;
    });

    container.innerHTML = `
      <a href="index.html" class="back-to-home">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
          <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
        </svg>
        Bosh sahifaga qaytish
      </a>

      <!-- Main info and video grid -->
      <div class="service-hero-grid">
        <div class="service-info-column">
          <span class="category-tag">${service.categoryUz}</span>
          <h1 class="service-title">${service.titleUz}</h1>
          <div class="service-title-en">${service.title}</div>
          <p class="service-desc">${service.longDescription}</p>
          
          <h3 class="section-title" style="font-size: 20px; margin-bottom: 15px;">Xizmat Afzalliklari</h3>
          <ul class="highlights-list">
            ${highlightsHtml}
          </ul>
        </div>
        
        <div class="service-media-wrapper">
          <img src="${service.imageSrc}" class="service-img-fallback" alt="${service.titleUz}" id="fallback-img">
          <video class="service-video" id="detail-video" src="${service.videoSrc}" loop muted playsinline autoplay></video>
        </div>
      </div>

      <!-- Pricing section -->
      <h2 class="section-title">Sayohat Paketlari (Tariflar)</h2>
      <div class="pricing-grid">
        ${pricingHtml}
      </div>

      <!-- Specialists and Booking section split -->
      <div class="booking-section-grid">
        <div>
          <h2 class="section-title">Saralangan Gidlar va Haydovchilarimiz</h2>
          <div class="specialists-list">
            ${specialistsHtml}
          </div>
        </div>
        
        <div>
          <h2 class="section-title" id="booking-title">Buyurtma Berish Formasi</h2>
          <div class="booking-card">
            <form class="booking-form" onsubmit="handleBookingSubmit(event)">
              <div class="form-row">
                <div class="form-group">
                  <label for="book-package">Tanlangan Sayohat Paketi</label>
                  <select id="book-package" required>
                    ${dropdownOptionsHtml}
                  </select>
                </div>
                <div class="form-group">
                  <label for="book-specialist">Sayohat Gidi / Haydovchi</label>
                  <select id="book-specialist" required>
                    ${specialistDropdownOptionsHtml}
                  </select>
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label for="book-date">Sana</label>
                  <input type="date" id="book-date" required>
                </div>
                <div class="form-group">
                  <label for="book-time">Vaqt</label>
                  <input type="time" id="book-time" required>
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label for="book-location">Sayohat Turi (Guruhli/Shaxsiy)</label>
                  <select id="book-location" required>
                    <option value="Guruhli sayohat">Guruhli sayohat</option>
                    <option value="Shaxsiy sayohat">Shaxsiy sayohat (Faqat siz uchun)</option>
                    <option value="VIP Premium sayohat">VIP Premium sayohat</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="book-method">Odamlar soni</label>
                  <select id="book-method" required>
                    <option value="1 kishi">1 kishi</option>
                    <option value="2-4 kishi">2-4 kishi</option>
                    <option value="5-9 kishi">5-9 kishi</option>
                    <option value="10+ kishi (Guruh)">10+ kishi (Guruh)</option>
                  </select>
                </div>
              </div>

              <div class="form-group">
                <label for="book-name">To'liq ism-sharifingiz</label>
                <input type="text" id="book-name" required placeholder="Ali Valiyev">
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label for="book-phone">Telefon raqamingiz</label>
                  <input type="tel" id="book-phone" required placeholder="+998 90 123 45 67">
                </div>
                <div class="form-group">
                  <label for="book-email">Email manzilingiz</label>
                  <input type="email" id="book-email" required placeholder="example@mail.com">
                </div>
              </div>

              <div class="form-group">
                <label for="book-notes">Qo'shimcha istaklar (ixtiyoriy)</label>
                <textarea id="book-notes" rows="3" placeholder="Masalan: Maxsus til biladigan gid, bolalar aravachasi yoki oziq-ovqat cheklovlari va h.k."></textarea>
              </div>

              <button type="submit" class="book-submit-btn">Buyurtmani Tasdiqlash</button>
            </form>
          </div>
        </div>
      </div>

      <!-- FAQ Section -->
      <h2 class="section-title">Tez-tez so'raladigan savollar</h2>
      <div class="faq-wrapper">
        ${faqsHtml}
      </div>

      <!-- Reviews Section -->
      <h2 class="section-title">Mijozlarimizdan Sharhlar</h2>
      <div class="reviews-grid">
        ${reviewsHtml}
      </div>
    `;
  }

  // Interactivity initialization
  function initInteractiveFeatures() {
    // 1. Video opacity fade-in
    const video = document.getElementById('detail-video');
    if (video) {
      video.addEventListener('canplay', function() {
        this.classList.add('ready');
      });
      // Handle cache loaded
      if (video.readyState >= 3) {
        video.classList.add('ready');
      }
      // Image fallback handle
      const fallback = document.getElementById('fallback-img');
      fallback.addEventListener('error', function() {
        this.src = 'https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&w=800&h=600&q=80';
      });
    }

    // 2. Pricing Plan Click
    const pricingCards = document.querySelectorAll('.pricing-card');
    const packageSelect = document.getElementById('book-package');

    pricingCards.forEach(card => {
      card.addEventListener('click', () => {
        pricingCards.forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');

        selectedPlanName = card.getAttribute('data-plan-name');
        selectedPlanPrice = card.getAttribute('data-plan-price');

        // Sync with form dropdown
        if (packageSelect) {
          packageSelect.value = selectedPlanName;
        }

        // Smooth scroll to booking form title
        document.getElementById('booking-title').scrollIntoView({ behavior: 'smooth', block: 'center' });
      });
    });

    // Sync form package back to cards
    if (packageSelect) {
      packageSelect.addEventListener('change', (e) => {
        const val = e.target.value;
        pricingCards.forEach(card => {
          if (card.getAttribute('data-plan-name') === val) {
            pricingCards.forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            selectedPlanName = card.getAttribute('data-plan-name');
            selectedPlanPrice = card.getAttribute('data-plan-price');
          }
        });
      });
    }

    // 3. Specialist Card Click and Sync
    const specialistCards = document.querySelectorAll('.specialist-card');
    const specialistSelect = document.getElementById('book-specialist');

    specialistCards.forEach(card => {
      card.addEventListener('click', () => {
        const providerName = card.getAttribute('data-provider-name');
        
        // Toggle selection
        if (card.classList.contains('selected')) {
          card.classList.remove('selected');
          if (specialistSelect) {
            specialistSelect.value = 'any';
          }
        } else {
          specialistCards.forEach(c => c.classList.remove('selected'));
          card.classList.add('selected');
          if (specialistSelect) {
            specialistSelect.value = providerName;
          }
        }
      });
    });

    // Sync form specialist selection back to cards
    if (specialistSelect) {
      specialistSelect.addEventListener('change', (e) => {
        const val = e.target.value;
        specialistCards.forEach(card => {
          if (card.getAttribute('data-provider-name') === val) {
            card.classList.add('selected');
          } else {
            card.classList.remove('selected');
          }
        });
      });
    }

    // 4. FAQ Accordion Toggle
    const faqQuestions = document.querySelectorAll('.faq-question');
    faqQuestions.forEach(q => {
      q.addEventListener('click', () => {
        const item = q.parentElement;
        const isActive = item.classList.contains('active');

        // Close all first for accordion behavior
        document.querySelectorAll('.faq-item').forEach(i => i.classList.remove('active'));

        if (!isActive) {
          item.classList.add('active');
        }
      });
    });

    // Set today's date as min for booking date field
    const dateInput = document.getElementById('book-date');
    if (dateInput) {
      const today = new Date().toISOString().split('T')[0];
      dateInput.min = today;
    }
  }

  // Handle Form Submission
  function handleBookingSubmit(e) {
    e.preventDefault();

    const name = document.getElementById('book-name').value;
    const phone = document.getElementById('book-phone').value;
    const date = document.getElementById('book-date').value;
    const time = document.getElementById('book-time').value;
    const specialistVal = document.getElementById('book-specialist').value;
    const locationVal = document.getElementById('book-location').value;
    const methodVal = document.getElementById('book-method').value;

    let specialistDisplay = "Istalgan bo'sh gid/haydovchi (Tizim tanlaydi)";
    if (specialistVal !== "any") {
      specialistDisplay = specialistVal;
    }

    const modalSummary = document.getElementById('modal-summary');
    modalSummary.innerHTML = `
      <div class="summary-row">
        <span class="summary-label">Mijoz:</span>
        <span class="summary-val">${name}</span>
      </div>
      <div class="summary-row">
        <span class="summary-label">Telefon:</span>
        <span class="summary-val">${phone}</span>
      </div>
      <div class="summary-row">
        <span class="summary-label">Tarif:</span>
        <span class="summary-val">${selectedPlanName} (${selectedPlanPrice})</span>
      </div>
      <div class="summary-row">
        <span class="summary-label">Gid / Haydovchi:</span>
        <span class="summary-val" style="color: var(--primary-hover); font-weight: 700;">${specialistDisplay}</span>
      </div>
      <div class="summary-row">
        <span class="summary-label">Sayohat Turi:</span>
        <span class="summary-val">${locationVal}</span>
      </div>
      <div class="summary-row">
        <span class="summary-label">Odamlar Soni:</span>
        <span class="summary-val">${methodVal}</span>
      </div>
      <div class="summary-row">
        <span class="summary-label">Sana & Vaqt:</span>
        <span class="summary-val">${date} soat ${time} da</span>
      </div>
    `;

    // Open Modal
    document.getElementById('modal-backdrop').classList.add('active');
  }

  // Close Modal and Redirect
  function closeModal() {
    document.getElementById('modal-backdrop').classList.remove('active');
    // Redirect back to main page
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
